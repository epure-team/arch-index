name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.3'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install deps
        run: opam install --deps-only --yes .
      - name: Build
        run: opam exec -- dune build
      - name: Unit and integration tests
        run: opam exec -- dune test
      - name: Shell integration tests
        run: |
          chmod +x selftest-contract.sh selftest-load.sh selftest-effects.sh selftest-callgraph-ocaml.sh selftest-callgraph-soundness.sh selftest-callgraph-go.sh
          ./selftest-contract.sh
          ./selftest-load.sh
          ./selftest-effects.sh
          ./selftest-callgraph-ocaml.sh
          STRICT=1 ./selftest-callgraph-soundness.sh
          ./selftest-callgraph-go.sh
      - name: Self-index smoke test
        run: |
          BIN="./_build/default/bin/arch_callgraph_ocaml/arch_callgraph_ocaml.exe"
          opam exec -- "$BIN" \
            --build-dir=_build/default/lib/arch_index \
            --db-path=/tmp/self.db \
            --schema-path=architecture-schema.sql
          sqlite3 /tmp/self.db \
            "SELECT 'modules: ' || count(*) FROM modules; \
             SELECT 'functions: ' || count(*) FROM functions; \
             SELECT 'calls: ' || count(*) FROM calls;" \
            > /tmp/self-stats.txt
          diff test/fixtures/self-index-stats.txt /tmp/self-stats.txt \
            || { echo "Golden file mismatch — update: see docs/adr/001-self-index-golden.md"; exit 1; }

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
            profile: static
            extra_setup: sudo apt-get install -y libsqlite3-dev libgmp-dev zlib1g-dev
          - os: macos-latest
            suffix: macos-arm64
            profile: release
            extra_setup: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.3'
      - name: Platform setup
        if: matrix.extra_setup != ''
        run: ${{ matrix.extra_setup }}
      - name: Install deps and build
        run: |
          opam install --deps-only --yes .
          opam exec -- dune build --profile=${{ matrix.profile }}
      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in arch_index_cli arch_serve arch_callgraph_ocaml; do
            src=$(find _build -name "${bin}.exe" | head -1)
            if [ -n "$src" ]; then
              cp "$src" "dist/${bin}-${{ matrix.suffix }}"
              strip "dist/${bin}-${{ matrix.suffix }}" || true
            fi
          done
          ls -la dist/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
          body_path: CHANGELOG.md
